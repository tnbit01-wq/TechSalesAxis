      #   with:
      #     args: deploy --prod --dir=apps/web/.next --functions=apps/web/netlify/functions
      #   env:
      #     NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      #     NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      # For AWS S3 + CloudFront:
